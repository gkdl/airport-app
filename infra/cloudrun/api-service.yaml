apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: airport-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/vpc-access-connector: projects/PROJECT_ID/locations/asia-northeast3/connectors/airport-vpc-connector
        run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      containerConcurrency: 80
      timeoutSeconds: 30
      containers:
        - image: asia-northeast3-docker.pkg.dev/PROJECT_ID/airport-app/api:latest
          ports:
            - containerPort: 3000
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: DB_PORT
              value: "1521"
            - name: DB_SID
              value: ORCL
            - name: JWT_EXPIRES_IN
              value: 7d
            - name: REDIS_PORT
              value: "6379"
          # Secret Manager에서 민감 정보 주입
          - name: DB_HOST
            valueFrom:
              secretKeyRef:
                name: airport-db-host
                key: latest
          - name: DB_USER
            valueFrom:
              secretKeyRef:
                name: airport-db-user
                key: latest
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: airport-db-password
                key: latest
          - name: REDIS_HOST
            valueFrom:
              secretKeyRef:
                name: airport-redis-host
                key: latest
          - name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: airport-redis-password
                key: latest
          - name: JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: airport-jwt-secret
                key: latest
