name: CI

on:
  push:
    branches: [main, 'claude/**', 'feature/**']
  pull_request:
    branches: [main]

jobs:
  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check — packages
        run: npx turbo type-check --filter=@airport-app/tokens --filter=@airport-app/types --filter=@airport-app/utils --filter=@airport-app/hooks

      - name: Type check — API
        run: npx turbo type-check --filter=@airport-app/api

      - name: Type check — Batch
        run: npx turbo type-check --filter=@airport-app/batch

      - name: Type check — Web
        run: npx turbo type-check --filter=@airport-app/web

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx turbo lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npx turbo test

  build-docker:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [type-check, lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: airport-api:ci

      - name: Build Batch image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/batch/Dockerfile
          push: false
          tags: airport-batch:ci
