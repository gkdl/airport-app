name: Deploy to GCP Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-northeast3
  REGISTRY: asia-northeast3-docker.pkg.dev

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/airport-app/api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/airport-app/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Batch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/batch/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/airport-app/batch:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/airport-app/batch:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy airport-api \
            --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/airport-app/api:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --min-instances=1 \
            --max-instances=10 \
            --memory=512Mi \
            --cpu=1 \
            --port=3000 \
            --set-secrets="DB_HOST=airport-db-host:latest,DB_USER=airport-db-user:latest,DB_PASSWORD=airport-db-password:latest,REDIS_HOST=airport-redis-host:latest,REDIS_PASSWORD=airport-redis-password:latest,JWT_SECRET=airport-jwt-secret:latest"

      - name: Deploy Batch to Cloud Run Jobs
        run: |
          gcloud run jobs update airport-batch \
            --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/airport-app/batch:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --set-secrets="DB_HOST=airport-db-host:latest,DB_USER=airport-db-user:latest,DB_PASSWORD=airport-db-password:latest,REDIS_HOST=airport-redis-host:latest,REDIS_PASSWORD=airport-redis-password:latest,INCHEON_API_KEY=airport-incheon-api-key:latest,KAC_API_KEY=airport-kac-api-key:latest,KMA_API_KEY=airport-kma-api-key:latest,FIREBASE_PROJECT_ID=airport-firebase-project-id:latest,FIREBASE_CLIENT_EMAIL=airport-firebase-client-email:latest,FIREBASE_PRIVATE_KEY=airport-firebase-key:latest,SLACK_WEBHOOK_URL=airport-slack-webhook:latest"

      - name: Notify deployment
        run: |
          echo "✅ Deployed API & Batch — commit ${{ github.sha }}"
